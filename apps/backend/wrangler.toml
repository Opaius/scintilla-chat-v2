name = "scintilla-backend"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "scintilla-chat"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "REMULT_ROOM"
class_name = "RemultPartyRoom"

[[durable_objects.bindings]]
name = "REMULT_LIVEQUERY"
class_name = "RemultLiveQueryStorageRoom"

[[migrations]]
tag = "v1"
new_classes = ["RemultPartyRoom", "RemultLiveQueryStorageRoom"]

[vars]
BETTER_AUTH_URL = "http://localhost:8788"
BETTER_AUTH_SECRET = "dev-secret-change-in-production-32chars"
AUTH_TRUSTED_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173,http://localhost:8788"
RESEND_API_KEY = ""
RESEND_FROM = "noreply@scintilla.chat"

# ── Creem (Merchant of Record, Flow A) ──
# Secrets belong in `wrangler secret put` for production; these dev placeholders
# let the webhook + checkout bindings resolve locally.
CREEM_API_KEY = ""
CREEM_WEBHOOK_SECRET = "dev-creem-webhook-secret"
CREEM_TEST_MODE = "true"

# ── Realtime routing ──
MAX_CONNECTIONS_PER_SHARD = "100"
